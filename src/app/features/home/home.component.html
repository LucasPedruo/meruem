<section class="home" aria-labelledby="header-title">
  <div class="wrapper-home">
    <header class="header">
      <img class="header__img" src="fulldev.png" alt="logo FullDev" />

      <div>
        <h1 class="header__title" id="header-title">FullDev</h1>
        <ul class="header__stats-list">
          <li class="header__stats-list__item">
            <img class="header__stats-list__item-icon" src="member.svg" alt="" aria-hidden="true" />
            <p class="header__stats-list__item-text">3933 Membros gerais</p>
          </li>

          <li class="header__stats-list__item">
            <img
              class="header__stats-list__item-icon"
              src="group-chat.svg"
              alt=""
              aria-hidden="true"
            />
            <p class="header__stats-list__item-text">8 Grupos</p>
          </li>

          <li class="header__stats-list__item">
            <img
              class="header__stats-list__item-icon"
              src="cupcake.svg"
              alt=""
              aria-hidden="true"
            />
            <p class="header__stats-list__item-text">Desde 06/2024</p>
          </li>
        </ul>
      </div>
    </header>

    <section>
      <app-grupos-component
        [showIcon]="true"
        text="Tecnologia 1"
        [description]="'958 de 1024 Membros'"
        [linkGroup]="'ChrXjnNn3Xh1gTikrYyjAs'"
      ></app-grupos-component>

      <app-grupos-component
        [showIcon]="true"
        text="Tecnologia 2"
        [description]="'319 de 1024 Membros'"
        [linkGroup]="'H3uqzOSGodo9URWQbKQBgq'"
      ></app-grupos-component>

      <app-grupos-component
        [src]="'queens.jpg'"
        [showIcon]="true"
        text="Queens of Deploy"
        [description]="'550 de 1024 Membros'"
        [linkGroup]="'KOKFfsXGD1PBVWvAXXNbcb'"
      ></app-grupos-component>

      <app-grupos-component
        [src]="'RainbowStack.png'"
        [showIcon]="true"
        text="RainbowStack"
        [description]="'102 de 1024 Membros'"
        [linkGroup]="'BtWA88gNq3KGmAxAobB8X3'"
      ></app-grupos-component>

      <app-custom-button-component
        sizes="large"
        color="primary"
        (buttonClick)="openModal()"
        text="Exibir todos os grupos"
        aria-haspopup="dialog"
      >
      </app-custom-button-component>
    </section>

    <app-social-component></app-social-component>

    <app-footer-component></app-footer-component>

    <app-custom-modal title="Grupos" [isOpen]="showModal" (closeModal)="closeModal()">
      @for(item of groups(); track item){
        <app-grupos-component
          [parentType]="'modal'"
          [text]="item.text"
          [description]="item.description"
          [src]="item.src"
          [linkGroup]="item.linkGroup"
        ></app-grupos-component>
      }
    </app-custom-modal>

  </div>
</section>
